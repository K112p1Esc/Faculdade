<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/quiz.css">
</head>

<body>
    <header>
        <div class="logo">
            <!-- Imagem retirada de -> https://www.deviantart.com/goji25/art/Godzilla-Minus-One-Logo-1058770268 -->
            <img src="../img/logo.png" alt="">
            <p class="titulo">Gojira View</p>
        </div>

        <div class="links">
            <a href="../index.html" class="escolhaLinks">Home</a>
            <a href="filmes.html" class="escolhaLinks">Filmes</a>
            <a href="trajes.html" class="escolhaLinks">Trajes</a>
            <a href="login.html" class="escolhaLinks login">Login</a>
        </div>
    </header>

    <main>

        <!-- QUIZ -->
        <section id="quizArea" class="quizContainer">
            <div class="qualPergunta" id="qualPergunta"></div>

            <div class="tituloPergunta" id="tituloPergunta"></div>

            <div class="imagemPergunta" id="imagemPergunta"></div>

            <div class="respostaPergunta" id="respostaPergunta1"></div>
            <div class="respostaPergunta" id="respostaPergunta2"></div>
            <div class="respostaPergunta" id="respostaPergunta3"></div>
            <div class="respostaPergunta" id="respostaPergunta4"></div>

            <div class="botaoPergunta">
                <button onclick="confirmation()">
                    Confirmar resposta
                </button>
            </div>
        </section>

        <!-- RESULTADO -->
        <section id="resultadoArea" class="quizContainer" style="display: none;">
            <div id="nomeTotal" class="nomeTotal"></div>
            <div id="quantiaAcerto" class="quantiaAcerto"></div>
            <div id="questoesCertas" class="questoesCertas"></div>
        </section>

    </main>
    
    <footer>
        <div class="footerContainer">
            <p class="footerCopy">
                © 2026 Gojira View. Desenvolvido por Matheus Maceu. Todos os direitos reservados.
            </p>

            <p class="footerDisclaimer">
                Godzilla e todos os elementos relacionados são © Toho Co., Ltd.
                Este é um projeto acadêmico sem fins comerciais.
            </p>
        </div>
    </footer>

    <script src="../js/quiz2.js"></script>
    <script src="../js/quiz.js"></script>
</body>

</html>
