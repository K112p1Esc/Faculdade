<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chart JS</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="display: flex; flex-direction: row;">
  <div>
    <canvas id="first" style="position: relative; height:50vh; width:50vw"></canvas>
  </div>
  <div>
    <canvas id="second" style="position: relative; height:45vh; width:45vw"></canvas>
  </div>
</body>

</html>

<script>
  const ctx = document.getElementById('first');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'],
      datasets: [{
        label: 'Temperatura',
        data: [30, 29, 28, 25, 22, 23],
        backgroundColor: [
          '#FF69B4',
          '#FF69B4',
          '#FF69B4',
          '#FF69B4',
          '#FF69B4',
          '#FF69B4'
        ],
        borderColor: [
          '#FF69B4',
          '#FF69B4',
          '#FF69B4',
          '#FF69B4',
          '#FF69B4',
          '#FF69B4',
          '#FF69B4'
        ],
        borderWidth: 1
      },
      {
        label: 'Umidade',
        data: [80, 82, 80, 85, 80, 83],
        backgroundColor: [
          '#0000ff',
          '#0000ff',
          '#0000ff',
          '#0000ff',
          '#0000ff',
          '#0000ff'
        ],
        borderColor: [
          '#0000ff',
          '#0000ff',
          '#0000ff',
          '#0000ff',
          '#0000ff',
          '#0000ff'
        ],
        borderWidth: 1
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: false
        }
      }
    }
  });
</script>

<script>
  const ctx2 = document.getElementById('second')

  new Chart(ctx2, {
    type: 'bar',
    data: {
      labels: ['janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho'],
      datasets: [{
        label: 'Temperatura Média',
        data: [22, 24, 27, 23, 20, 18],
        backgroundColor: [
          '#FF69B4'
        ],
        borderColor: [
          '#FF69B4'
        ],
        borderWidth: 1
      },
      {
        label: 'Umidade Média',
        data: [90, 89, 93, 87, 88, 82],
        backgroundColor: [
          '#0000ff'
        ],
        borderColor: [
          '#0000ff'
        ],
        borderWidth: 1
      }]
    },
  });
</script>
