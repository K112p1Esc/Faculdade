<!-- 10.  Controle de horas assistindo streaming

Estima-se que os usuários de conteúdo de Streaming gastem cerca de 100 milhões de horas por 
dia nesse tipo de entretenimento.  

Em média um episódio de seriado americano do estilo SITCOM (Friends, How I Met Your Mother, 
Dois Homens e Meio, etc.) tem 22min de duração.  

Sabendo disso, crie um programa o qual:  

a) Peça ao usuário para informar a última série (SITCOM) que ele assistiu 

b) Peça ao usuário para informar o total de episódios que ele já assistiu da série 

c) Tenha um botão "Verificar nível" que exiba abaixo dele a seguinte frase:  

     "Vejo que você gosta da série X"   

E se o usuário já gastou mais de 30 horas na série informada, exiba também: "Uau, você realmente gosta dessa série!".  

Obs: Considere 22min como o tempo de duração de 1 episódio.   -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    Insira a última sitcom que assistiu:
    <input type="text" id="sitcom" />
    <br />
    Total episódios
    <input type="text" id="epTotal" />
    <br />
    <button onclick="verificar()">Verificar Nível</button>
    <div id="exibir"></div>
  </body>
</html>

<script>
  function verificar() {
    let serie = sitcom.value;
    let total = Number(epTotal.value);
    let nivel = (total * 22) / 60;
    nivel = nivel.toFixed(2);

    if (nivel < 30) {
      exibir.innerHTML = `Vejo que você gosta da série ${serie}. `;
    } else {
      exibir.innerHTML =
        `Vejo que você gosta da série ${serie}. ` + "Uau, você realmente gosta dessa série!";
    }
  }
</script>
