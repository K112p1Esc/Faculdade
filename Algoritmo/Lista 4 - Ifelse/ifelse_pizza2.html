<!-- 5. Rola a pizza - parte-2

Refaça a questão anterior de tal forma que a frase do item d) apareça na cor de letra vermelha com itálico e negrito.

Um grupo de amigos costuma se reunir na casa de um deles para comer pizza. 
Só que eles têm um trato de que o valor da pizza, quando dividido entre os amigos, não deve 
passar de 20,00 por amigo. Ajude-os criando um programa o qual: 

a) Pergunte o valor da pizza 

b) Pergunte a quantidade de amigos reunidos 

c) Ao clicar em "Rola a pizza?", calcule e exiba o valor que cada amigo vai pagar na pizza 
com uma frase na página como esta "Cada amigo vai pagar R$X pela pizza" 

d) Somente caso o valor por amigo passe de R$20,00, exiba também a frase "Deu ruim! Pizza muito cara!"
 -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    Valor da pizza:
    <input type="text" id="valorPizza" />
    <br />
    Quantidade de amigos:
    <input type="text" id="qtdAmigo" />
    <button onclick="pizza()">Rola a pizza?</button>
    <div id="exibir"></div>
  </body>
</html>

<script>
  function pizza() {
    let valor = Number(valorPizza.value);
    let qtd = Number(qtdAmigo.value);
    let total = valor / qtd;
    total = total.toFixed(2); //novamente, so para bonito.

    if (total > 20) {
      exibir.innerHTML =
        `Cada amigo vai pagar R$${total} pela pizza. ` +
        "<div style='color: red;'><i><b>Deu ruim! Pizza muito cara!</b></i></div>";
    } else {
      exibir.innerHTML = `Cada amigo vai pagar R$${total} pela pizza`;
    }
  }
</script>
