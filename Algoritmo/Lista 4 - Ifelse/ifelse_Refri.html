<!-- 2. Controle de Refrigerante

 Joka bebe com certa frequência e quer saber quanto consome de refrigerante em 1 ano. Para ajudá-lo a 
 saber essa informação, crie um programa o qual:   

a) Pergunte quantas latinhas de refrigerante toma por dia  

b) Ao clicar num botão "Quantos refris?", calcule a quantidade de refrigerante que ele consome em 1 ano, 
considerando que 1 ano possui 365 dias  

c) Exiba na página a quantidade de latinhas que ele consome por ano  

d) Somente caso a quantidade seja a partir de 500, exiba também a frase: "Cuidado com a diabetes!"   -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Quantas latinhas bebe por dia?
    <input type="text" id="qtdLata">
    <br>
    <button onclick="calculo()">Quantos refris?</button>
    <div id="exibir"></div>
</body>
</html>

<script>
    function calculo() {
        let refri = Number(qtdLata.value)
        let qtd = refri*365;
        if(qtd>=500) {
            exibir.innerHTML = 'Cuidado com a diabetes!'
        }else {
            exibir.innerHTML = qtd;
        }
    }
</script>
