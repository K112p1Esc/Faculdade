<!-- 3. Controle de notas 

Paty é muito estudiosa e sua meta é sempre ser uma aluna fora de série. Na faculdade 
onde estuda, os "fora de série" são os alunos com média acima de 9,4. Portanto, para ajudá-la, crie um programa o qual:  

a) Pergunte o valor de 3 notas  

b) Ao clicar num botão "Analisar desempenho", calcule a média entre as notas e exiba na tela a frase 
"Sua média foi de X", onde X é a média calculada  

c) Somente caso a média for acima de 9,4 exibir também a frase "Parabéns, você é fora de série!"   -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    nota 1:
    <input type="text" id="nota1">
    <br>
    nota 2:
    <input type="text" id="nota2">
    <br>
    nota 3:
    <input type="text" id="nota3">
    <br>
    <button onclick = "analisar()">Analisar Desempenho</button>
    <div id="exibir"></div>
</body>
</html>

<script>
    function analisar() {
        let n1 = Number(nota1.value);
        let n2 = Number(nota2.value);
        let n3 = Number(nota3.value);

        let media =(n1+n2+n3)/3;
        media = media.toFixed(2); //Se quiser pode ignorar isso, só para deixar bonito.

        if(media>9.4){
            exibir.innerHTML = `Sua média foi de ${media}. Parabéns, você é fora de série!`
        }else {
            exibir.innerHTML = `Sua média foi de ${media}.` 
        }
    }
</script>
