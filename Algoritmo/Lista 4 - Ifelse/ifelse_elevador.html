<!-- 9. Controle de peso no elevador

Crie um programa que controle o peso médio dentro de um elevador:  

a) Solicite a quantidade de homens que entraram no elevador 

b) Solicite a quantidade de mulheres que entraram no elevador 

c) Ao clicar em "Analisar peso", calcule o peso estimado sendo: homens x 80 somado com mulheres x 60 

d) Exiba na página a mensagem "Este elevador suporta 800 Kg e o peso estimado desta lotação é de XXXkg"  

e) Se o peso estimado for maior que 800, exibir também a mensagem 
"Será necessário que alguém desça para que o elevador se movimente" - na cor azul.   -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Quantidade de homens:
    <input type="text" id="qtdHomem">
    <br>
    Quantidade de mulheres:
    <input type="text" id="qtdMulher">
    <br>
    <button onclick="peso()">Analisar peso</button>
    <div id="exibir"></div>
</body>
</html>

<script>
    function peso(){
        let homem = Number(qtdHomem.value)
        let mulher = Number(qtdMulher.value)
        let resultado = homem*80+mulher*60

        if (resultado > 800){
            exibir.innerHTML = `Este elevador suporta 800kg e o peso estimado desta locação é de ${resultado}kg`
            +
            '<div style="color:blue;">Será necessárioque alguém desça para que o elevador se movimente</div>'
        }else {
            exibir.innerHTML = `Este elevador suporta 800kg e o peso estimado desta locação é de ${resultado}kg`
        }
    }
</script>
