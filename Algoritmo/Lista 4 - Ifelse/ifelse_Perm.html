<!-- 1. Permissão para festa

Crie um programa que:  

a) Pergunte ao usuário sua idade.  

b) Ao clicar num botão "Ir pra festa":  

   b1) Caso a idade seja menor que 18, deve aparecer um alert com a frase "Pedir permissão pro responsável" 

   b2) Sempre vai aparecer um alert com a palavra "#partiuFesta" ao final  

OBS: caso tenha 18 anos ou mais, deve exibir somente a segunda mensagem. -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    Qual sua idade?
    <input type="text" id="idadeUsu" />
    <button onclick="permissao()">Ir pra festa</button>
  </body>
</html>

<script>
  function permissao() {
    let idade = Number(idadeUsu.value);
    if (idade < 18) {
      alert("Pedir permissão pro responsável");
    }
    alert("#partiuFesta");
  }
</script>
