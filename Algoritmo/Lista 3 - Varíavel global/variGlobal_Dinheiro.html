<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Quantia que deseja: <input type="text" id="quantia">
    <button onclick="deposito()">Depositar</button>
    <button onclick="retirar()">Retirar</button>
    <div id="exibir"></div>
</body>
</html>
<script>
    let resultado = 0;

    function deposito() {
        let valor = Number(quantia.value);
        resultado = resultado+valor;
        exibir.innerHTML = `Depósito de R$${valor} efetuado! Saldo atual: R$${resultado} `;
    }
    function retirar() {
        let valor = Number(quantia.value);
        resultado = resultado-valor;
        exibir.innerHTML = `Retirada de R$${valor} efetuado! Saldo atual: R$${resultado} `;
    }
</script>
