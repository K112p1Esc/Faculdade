<!-- Crie um programa o qual: 

a) Solicite uma senha ao usuário 

b) Enquanto ele digita, faça trocas para deixar a senha mais forte. Essas trocas são: 

    a ou A => @ 

    e ou E => 3 

 
c) Exiba o valor da senha mais forte logo abaixo, após as trocas (ou seja, o usuário vai vendo o novo valor na medida em que vai digitando) 

OBS: troque TODAS as ocorrências no texto, não só a primeira! Ex: rEAleza vira r3@l3z@, substituindo tanto "A"/"a" por @ e "E"/"e" por 3. -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    Insira uma senha <input type="text" id="senhaUsu" oninput="analisar()">
    <div id="msg"></div>
</body>

</html>

<script>
    function analisar() {
        let senha = senhaUsu.value;
        // mudancaSenha = senha
        //     .replaceAll('A', '@')
        //     .replaceAll('a', '@')
        //     .replaceAll('E', '3')
        //     .replaceAll('e', '3');

        // Tem como fazer assim:
        mudancaSenha = senha
        .replaceAll(/[Aa]/g, "@")
        .replaceAll(/[eE]/g, "3");   
        // Seria usando regex, esse em especifico é A ou a. O mesmo para e E. / serve para indicar regex e o g para geral.
        msg.innerHTML = mudancaSenha;
    }
</script>
