<!-- 2. Simulador de Preferências de Compras: Será que Robervaldo Gostaria?
Imagine que Robervaldo está buscando um novo celular. Ele tem algumas preferências específicas para a escolha de modelo.

Robervaldo prefere celulares com tela grande (acima de 6.5 polegadas) e que sejam da cor preta ou prata.

Com base nessas informações, crie um simulador no qual:

a) Solicite o tamanho da tela do celular encontrado.

b) Solicite a cor do celular encontrado, dentre as opções:

Preto
Prata
Azul
Vermelho
c) Ao clicar em "Será que ele gosta?", mostre, abaixo:

A imagem de uma pessoa feliz, caso as características do celular coincidam com as preferências de Robervaldo.
Ou a imagem de uma pessoa decepcionada, caso contrário.   -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Tamanho da tela do Celular:<input type="text" id="tamanho">
    Cor <select name="" id="colorido">
        <option>Preto</option>
        <option>Prata</option>
        <option>Azul</option>
        <option>Vermelho</option>
    </select>
    <button onclick="analisar()">Sera que ele gosta?</button>
    <div id="msg"></div>
</body>
</html>
<script>
    function analisar() {
        let tam = Number(tamanho.value);
        let cor = colorido.value;

        if (tam >6.5 && (cor =='Preto' || cor =='Prata')){
            msg.innerHTML = '<img src="https://img.freepik.com/fotos-gratis/homem-vestindo-camiseta-gesticulando_23-2149393651.jpg?semt=ais_rp_progressive&w=740&q=80" alt="">'
        }else {
            msg.innerHTML = '<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTFjXhf1K6xI9iO-kXFxmKMn5JlI_xVcr59bA&s" alt="">'
        }
    }
</script>
