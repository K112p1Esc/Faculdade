<!-- 3. Simulador de Preço do Bilhete Único de São Paulo
Crie um pequeno simulador de preço de passagem de Bilhete Único de São Paulo num programa, o qual: 

a) Tenha uma combo para indicar o tipo de passageiro, com os itens 

            Comum 
            Estudante 
            Idoso/PNE 

b) Tenha uma outra combo, para indicar o tipo de passagem, com os itens 

            Passagem única 
            Passagem integração 

c) Ao clicar num botão "Simular preço", considere que o preço unitário de uma passagem única é R$4,40 e que a integração é R$5,90 para fazer os cálculos necessários para exibir uma frase como esta: 

            Valor da passagem escolhida: R$X,XX 

d) Considere ainda que um estudante tem 50% de desconto e idoso/PNE possuem gratuidade em qualquer tipo de passagem 
 -->


<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    Tipo Passageiro:
    <select name="" id="passageiro">
        <option>Comum</option>
        <option>Estudante</option>
        <option value="idoso">Idoso/PNE</option>
    </select>
    <select name="" id="passagem">
        <option value="integracao">Passagem Integração</option>
        <option value="unica">Passagem Única</option>
    </select>
    <button onclick="analisar()">Simular Preço</button>
    <div id="msg"></div>
</body>

</html>
<script>
    function analisar() {
        let tipoPassageiro = passageiro.value;
        let tipoPassagem = passagem.value;
        let valor = 0;
        if (tipoPassagem == 'integracao') {
            valor = 5.90;
        } else {
            valor = 4.40;
        }
        if (tipoPassagem == 'idoso') {
            msg.innerHTML = 'Você possui gratuidade';
        } else if (tipoPassageiro == 'Estudante') {
            valor = valor/2;
            msg.innerHTML = `Você paga metade do valor, sendo ${valor}`;
        }else {
            msg.innerHTML = `Você paga o valor, sendo ${valor}`;
        }
    }
</script>
