<!-- 7. S2 Pares
Crie um programa o qual:
 
a) Ao clicar num botão "S2 Pares"...  

b) Exiba, debaixo do botão, todos os números pares de 0 a 100, um embaixo do outro    -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="analisar()">S2 Pares</button>
    <div id="msgDiv"></div>
</body>
</html>

<script>
    function analisar() {
        let i = 0;
        let msg = '';
        while (i < 100) {
            i+=2;
            msg += `${i}<br>`
        }
        msgDiv.innerHTML =`0<br> ${msg}`;
    }
</script>
