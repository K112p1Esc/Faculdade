<!-- 14. Dividibilidade  
Crie um programa o qual:

a) Solicite um intervalo crescente de valores numéricos

b) Solicite um número para teste de divisibilidade, ele tem que estar entre 3 e 13   

c) Ao clicar num botão "Divisível"...   

c) Exiba, debaixo do botão, todos os números contidos no intervalo doitem a que NÃO são divisíveis pelo número do item b.   -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Insira um número
    <input type="text" id="numero">
    Insira um número para dividir entre 3 e 13
    <input type="text" id="dividir">
    <button onclick="analisar()">Divisível</button>
    <div id="msg"></div>
</body>
</html>

<script>
    function analisar() {
        let num = Number(numero.value);
        let div = Number(dividir.value);    
        let i = 0;
        let teste = 0;
        let numeros = '';
        while (i<num) {
            i++;
            teste = i%div;
            if (teste!=0){
                numeros +=`${i}<br>` 
            }
        }
        msg.innerHTML = `Não são divisíveis:<br>${numeros}`;
    }
</script>
