<!-- 9. Viva o 7!
Crie um programa o qual:

a) Receba um número (tem que estar entre 0 e 200);  

b) Ter um botão chamado "Viva o 7!"   

c) Ao clicar nesse botão, devem aparecer todos os múltiplos de 7 entre 0 e o número informado em a) -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Insira um número entre 0 e 200
    <input type="text" id="numero">
    <button onclick="analisar()">Viva ao 7!</button>
    <div id="msgDiv"></div>
</body>
</html>

<script>
    function analisar() {
        let num = Number(numero.value);
        let i = 0;
        let valor = 0;
        num = parseInt(num / 7);
        
        while (i < num){
            i++;
            valor += `${i*7}<br>`
        }

        msgDiv.innerHTML = `${valor}`
    }
</script>
