<!-- 10. Pares no Intervalo  
Crie um programa o qual:

a) Solicite um intervalo crescente de valores numéricos    

b) Ao clicar num botão "S2 Pares"...   

c) Exiba, debaixo do botão, todos os números pares contidos no intervalo.   -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Insira um valor mínimo
    <input type="" id="valor">
    Insira um valor máximo
    <input type="" id="valor2">
    <button onclick="analisar()">S2 Pares</button>
    <div id="msgDiv"></div>
</body>
</html>

<script>
    function analisar() {
        let num = Number(valor.value);
        let num2 = Number(valor2.value);
        let msg = '';
        let i = num;
        if(num<num2){    
            while (i <= num2) {
                if(i%2==0){
                    msg += `${i}<br>`
                }
                i++;
            }
        }
        msgDiv.innerHTML =`${msg}`;
    }
</script>
