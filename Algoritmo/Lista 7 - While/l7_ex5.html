<!-- 5. Corrida de Voltas
Crie um programa o qual:

a) Pergunte ao usuário quantas voltas um carro dará numa corrida   

b) Ao clicar num botão "Iniciar corrida!"...   

c) Até que o carro termine a corrida, exiba, debaixo do botão, frases como estas:   

       Carro dando a 1ª volta   

       Carro dando a 2ª volta   

       Carro dando a 3ª volta

       ...   (até a última volta informada pelo usuário)

d) Ao atingir o número de voltas informado, exiba, abaixo de tudo, a frase "Corrida finalizada!"  -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Insira quantia de voltas
    <input type="text" id="qtdVolta">
    <button onclick="corrida()">Iniciar Corrida!</button>
    <div id="msgDiv"></div>
</body>
</html>

<script>
    function corrida() {
        let i = 0;
        let volta = qtdVolta.value;
        let msg = '';
        while (i < volta) {
            i++;
            msg += `Carro dando a ${i}º volta<br>`
        }
        msgDiv.innerHTML = msg+`Corrida Finalizada!`
    }
</script>
