<!-- 2. Frase Repetitiva
Crie um programa o qual: 
 
a) Tenha um botão "Diga algo sobre a matéria de Algoritmos";  

b) Ao clicar nele, mostre na própria página 7 vezes uma frase a sua escolha, uma abaixo da outra.   -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="analisar()">Diga Algo sobre a matéria de Algoritmos</button>
    <div id="msgDiv"></div>
</body>
</html>

<script>
    function analisar() {
        let i = 0;
        let msg = '';
        while (i < 7) {
            i++
            msg += 'Contemplem o Mago<br>'
        }
        msgDiv.innerHTML = msg;
    }
</script>
