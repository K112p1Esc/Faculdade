<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    Insira o seu Nome:
    <input type="text" id="inptNome" />
    <br />
    <br />
    Insira a Continuada:
    <input type="text" id="inptNota1" />
    &nbsp;&nbsp;&nbsp; Insira a Semestral:
    <input type="text" id="inptNota2" />
    <br />
    <button onclick="mostrarNota()">Mostrar Nota</button>
    <div id="exibir"></div>
  </body>
</html>

<script>
  function mostrarNota() {
    let nome = inptNome.value;
    let nota1 = Number(inptNota1.value);
    let nota2 = Number(inptNota2.value);
    let media;

    media = nota1 * 0.4 + nota2 * 0.6;

    exibir.innerHTML = `A média de ${nome} será de ${media}`;
  }
</script>
