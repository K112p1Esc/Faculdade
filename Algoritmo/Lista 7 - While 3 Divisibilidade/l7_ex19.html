<!-- 19. Números Primos
Crie  um programa o qual:

a) Ao exibir os divisores do número informado, caso o número seja divisível somente por 1 e por ele mesmo, exiba abaixo: 

     Divisores do Número 13:

     1

     13

     O número 13 é um número primo. -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    Insira um número de 0 a 100
    <input type="text" id="valor">
    <button onclick="analisar()">Ver Divisores</button>
    <div id="msg"></div>
</body>

</html>

<script>
    function analisar() {
        let num = Number(valor.value);
        let i = 0;
        let final = `Divisores do Número ${num}:<br>`;
        let cont = 0;
        if (num < 101 && num > -1) {
            while (i <= num) {
                if (num % i == 0) {
                    final += `${i}<br>`
                    cont++;
                }
                i++;
            }
        }
        msg.innerHTML = final;
        if(cont <=2) {
            msg.innerHTML +=` O número ${num} é um número primo.`
        }
    }
</script>
