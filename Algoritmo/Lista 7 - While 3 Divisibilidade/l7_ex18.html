<!-- 18. Divisores
Crie  um programa o qual:

a) Receba um número do usuário, que deve estar entre 0 e 100;

b) Ao clicar no botão "Ver Divisores", deve exibir na tela, abaixo do botão, todos os divisores do número informado, como o exemplo abaixo, onde o usuário inseriu o número "10": 
a
     Divisores do Número 10:

     1

     2

     5

     10 -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Insira um número de 0 a 100
    <input type="text" id="valor">
    <button onclick="analisar()">Ver Divisores</button>
    <div id="msg"></div>
</body>
</html>

<script>
    function analisar() {
        let num = Number(valor.value);
        let i = 0;
        let final = `O número ${num} é divisível por:<br>`;

        if(num<101 && num>-1){    
            while(i<=num) {
                if(num%i==0){
                    final += `${i}<br>`
                }
            i++;
            }
        }
        msg.innerHTML = final;
    }
</script>
