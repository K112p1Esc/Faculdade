<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Exercício 2</title>
</head>
<body>

Valor da Pizza?
<input type="text" id="valorPizza">
Quantidade de Amigos?
<input type="text" id="qtdAmigos">

<br><br>
<button onclick="lovePizza()">#lovePizza</button>

<div id="exibir2"></div>

<script>
function lovePizza() {
  n2 = valorPizza.value / qtdAmigos.value;
  exibir2.innerHTML = "O valor que cada um deve pagar é " + n2 + "R$";
}
</script>

</body>
</html>
