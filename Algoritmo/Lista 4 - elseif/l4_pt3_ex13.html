<!-- Crie um programa que ajude o usuário a escolher um Pokémon inicial e exiba 
a imagem correspondente.

a) Pergunte ao usuário qual Pokémon inicial ele escolheria entre Bulbasaur, 
Charmander ou Squirtle.
b) Ao clicar no botão "Escolher Pokémon", exiba a imagem do Pokémon escolhido 
abaixo do botão:

Bulbasaur → Exibir imagem do Bulbasaur
Charmander → Exibir imagem do Charmander
Squirtle → Exibir imagem do Squirtle
Se o usuário inserir um nome inválido, exibir uma mensagem "Pokémon não reconhecido." -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Qual pokémon inicial quer
    <input type="text" id="pokeNome">
    <button onclick="poke()">escolher Pokémon</button>
    <div id="msg"></div>
    
</body>
</html>

<script>
    function poke() {
        let poke = pokeNome.value;

        if (poke == 'Bulbasaur'){
            msg.innerHTML = `<img src='https://static0.srcdn.com/wordpress/wp-content/uploads/Bulbasaur-Looking-Up.jpg?w=1200&h=675&fit=crop'>`
        }else if(poke == 'Charmander'){
            msg.innerHTML = `<<img src='https://s2-ge.glbimg.com/KA7CaWaackKTbVQsYU3uSxZ39Yw=/0x0:1280x670/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_bc8228b6673f488aa253bbcb03c80ec5/internal_photos/bs/2021/k/W/ey3W2jRAmAY9m4dAgfZg/charmander.jpg'>`
        }else if(poke == 'Squirtle'){
            msg.innerHTML = `<img src='https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSgAlO-0TXNrQxBnt8-7NLUTolCfpvXhQFvqw&s'>`
        }else {
            msg.innerHTML = 'Pokémon não reconhecido'
        }
    }
</script>
