<!-- Crie um programa o qual:

a) Solicite a nota do aluno;

b) Ao clicar em "Classificar aluno", exiba uma dessas mensagens em um alert:

      "Aluno precisa de muita ajuda", caso a nota for menor que 5.
      "Aluno na média", caso a nota for entre 5 até 7.
      "Aluno na acima da média", caso a nota for maior que 7 até 9.5.
      "Aluno fora da curva", caso a nota for maior que 9.5.
 -->

 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    nota do aluno
    <input type="text" id="nota">
    <button onclick="analise()">classificar aluno</button>
    <div id="msg"></div>
 </body>
 </html>

 <script>
    let n1 = Number(nota.value)

    if (n1<5){
        msg.innerHTML = 'Aluno precisa de muita ajuda'
    }else if (n1 <=7){
        msg.innerHTML = 'Aluno na média'
    }else if (n1<=9.5) {
        msg.innerHTML = 'Aluno acima da média'
    }else {
        msg.innerHTML = 'Aluno fora da curva'
    }
 </script>
