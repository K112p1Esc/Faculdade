<!-- Crie um programa no qual um profissional de educação física possa 
 determinar de forma mais rápida quais esportes uma pessoa tem uma boa 
 altura para praticar. 

a) Solicite a altura do usuário;

b) Ao clicar em "Analisar Estatura", deve aparecer abaixo uma dessas frases: 

   "Você pode ser piloto de corrida" (altura até 1.65) 

   "Você pode ser jogador de futebol" (altura +1.65 até 1.80) 

   "Você pode ser jogador de vôlei ou basquete" (altura + 1.80)  -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    Insira sua altura:
    <input type="text" id="altura">
    <button onclick="analisar()">Analisar Estatura</button>
    <div id="msg"></div>
</body>

</html>

<script>
    function analisar() {
        alt = Number(altura.value);

        if (alt <= 1.65){
            msg.innerHTML = `Você pode ser piloto de corrida`
        }else if (alt<=1.80){
            msg.innerHTML = `Você pode ser jogador de futebol`
        }else {
            msg.innerHTML = `Você pode ser jogador de vôlei ou basquete`
        }
    }
</script>
