<!-- Crie um programa que exibe a classe social de uma pessoa que mora em Tuvalu 
(um dos menores países do mundo) conforme a renda familiar mensal. 

a) Solicite a renda familiar mensal 

b) Ao clicar no botão “Analisar Renda”, deve aparecer abaixo uma dessas frases:   

   "Classe E" (até 250) 

   "Classe D" (+250 até 900) 

   "Classe C" (+900 até 2500) 

   "Classe B" (+2500 até 9500) 

   "Classe A" (+9500) -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Informe renda mensal
    <input type="text" id="renda">
    <button onclick="analise()">Analisar Renda</button>
    <div id="msg"></div>
</body>
</html>

<script>
    let ren = Number(renda.value)
    if (ren <= 250){
        msg.innerHTML = 'Classe E'
    }else if (ren <= 900){
        msg.innerHTML = 'Classe D'
    }else if (ren <= 2500){
        msg.innerHTML = 'Classe C'
    }else if (ren <= 9500){
        msg.innerHTML = 'Classe B'
    }else {
        msg.innerHTML = 'Classe A'
    }
</script>
