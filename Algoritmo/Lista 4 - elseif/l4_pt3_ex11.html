<!-- Crie um programa que enviará um alerta de acordo com a umidade do ambiente, 
buscando evitar problemas respiratórios devido à falta de umidade relativa do ar.

a) Pergunte a umidade atual do ambiente.
b) Ao clicar em "Verificar umidade": 

    b1) Valide se o valor informado está entre 0 e 100% e exiba um alerta de erro 
    caso esteja fora desse intervalo.

    b2) Caso o valor informado esteja dentro do intervalo, exiba a mensagem adequada:

"Estado de Emergencia" (abaixo de 12%)
"Estado de alerta" (entre 12% e 20%)
"Estado de atenção" (acima de 20% até 30%)
"Nenhum risco" (acima de 30%) -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    qual umidade atual
    <input type="text" id="umidadeAtual">
    <button onclick="verif()">verificar umidade</button>
    <div id="msg"></div>
</body>
</html>

<script>
    function verif(){
        let umi = Number(umidadeAtual.value)
        if(umi < 0){
            alert('Valor inválido');
        }else if(umi > 100) {
            alert('Valor inválido');
        }else {
            if (umi<12){
                msg.innerHTML = 'Estado de Emergencia';
            }else if (umi<21){
                msg.innerHTML = 'Estado de Alerta';
            }else if (umi<31){
                msg.innerHTML = 'Estado de Atenção';
            }else { 
                msg.innerHTML = 'Nenhum Risco';
            }
        }
    }   
</script>
