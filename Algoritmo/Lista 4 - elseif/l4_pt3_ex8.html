<!-- Crie um programa o qual: 

a) Pergunte ao usuário qual sua meta de economia; 

b) Pergunte ao usuário quanto tem guardado; 

c) Ao clicar em "Analisar economia"... 

d) Caso a meta tenha sido alcançada, exibir, abaixo do botão, a frase “Parabéns,
 meta alcançada!”.  

e) Caso a meta tenha sido ultrapassada, exibir a frase anterior e também a frase “
Meta ultrapassada em X” (onde X é a diferença entre a economia e a meta) 

f) Caso a meta ainda não tenha sido alcançada, exibir, abaixo do botão, a frase 
“Força! Ainda em busca da meta! Falta X” (onde X é a diferença entre a meta e a economia)  -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Sua meta de economia
    <input type="text" id="metaEcon">
    <br>
    Sua economia atual
    <input type="text" id="atualEcon">
    <button onclick="analisar()">Analisar Economia...</button>
    <div id="msg"></div>
</body>
</html>

<script>
    let meta = Number(metaEcon.value);
    let atual = Number(atualEcon.value)

    if (meta < atual){
        msg.innerHTML = `Meta ultrapassada em ${atual-meta}`
    }else if (meta == atual){
        msg.innerHTML = 'Parabéns, meta alcançada!'
    }else{
        msg.innerHTML = `Força! ainda em busca da meta!`
    }
</script>
