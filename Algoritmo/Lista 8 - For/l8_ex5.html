<!-- 5. Estrelas de Recompensa
Refaça o programa anterior de tal forma de que:
Somente nos meses que ganhou o "bônus", apareça uma imagem de uma estrela bem pequena (reduza a imagem para ficar quase do tamanho da fonte) à direita do valor acumulado. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Informe quantos depósitos você fez
    <input type="text" id="depBanco">
    <br>
    Informe o valor dos depósitos
    <input type="text" id="qtdDep">
    <br>
    <button onclick="analisar()">Acompanhar Grana</button>
    <div id="msg"></div>
</body>
</html>

<script>
    function analisar() {
        let dep = Number(depBanco.value);
        let qtd = Number(qtdDep.value);
        let mssg = '';
        let qtdTotal = 0

        for(let i = 1; i<=dep;i++){
            if (i%3==0){
                qtdTotal = qtd+qtdTotal;
                qtdTotal += qtdTotal*0.01;
                mssg += `${i}º Mês: R$ ${(qtdTotal).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}<img src="https://img.freepik.com/fotos-premium/rotulo-de-etiqueta-de-papel-em-forma-de-estrela-amarela-isolada-no-fundo-branco_293060-7918.jpg?semt=ais_hybrid&w=740&q=80" alt="" width="15px"><br>`;
            }else {
                qtdTotal = qtdTotal+qtd;
                mssg += `${i}º Mês: R$ ${(qtdTotal).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}<br>`;
            }
        }
        msg.innerHTML = mssg;
    }
</script>
