<!-- 16. Treino de Musculação
Crie um programa o qual:

a) Pergunte de quantos em quantos dias o usuário faz musculação (é só uma informação, só 1 número, ok?)   

b) Ao clicar em "Exibir rotina mensal", mostre uma sequência de 30 frases, como neste exemplo:   

         Dia 1 - Musculação   

         Dia 2 - Comer, dormir etc   

         Dia 3 - Comer, dormir etc   

         Dia 4 - Musculação   

         Dia 5 - Comer, dormir etc   

         Dia 6 - Comer, dormir etc   

         Dia 7 - Musculação   

         ...

         Dia 30 - Comer, dormir etc   

O Dia 1 sempre é de "Musculação"   

Considere que, nesse exemplo acima, o usuário informou 3 no item a)    -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Informe de quantos em quantos dias faz musculação
    <br>
    <input type="text" id="valor">
    <button onclick="analisar()">Exibir Rotina Mensal</button>
    <div id="msg"></div>
</body>
</html>

<script>
    function analisar() {
        let qtd = Number(valor.value);
        let musc = 'Musculação<br>'
        let rot = 'Trabalhar, comer e dormir<br>'
        let i = 0;
        let final = '';
        let cont = 0;

        let vetor = [];
        let verif = true;
        let teste = 1;
        let cont2 = 0;
        while (verif) {
            if (teste==1){

            }else if(teste < 30) {
                vetor[cont2] = teste;
                cont2++;
            }
            teste+=qtd;
            if (teste > 30){
                verif = false;
            }
        }
        while(i<30){
            i++;
            if (i == 1) {
                final += `Dia ${i} - ${musc}`
            }else if (i==vetor[cont]){
                final += `Dia ${i} - ${musc}`
                cont++;
            }else {
                final += `Dia ${i} - ${rot}`
            }
        }
        msg.innerHTML = final;
    }
</script>
