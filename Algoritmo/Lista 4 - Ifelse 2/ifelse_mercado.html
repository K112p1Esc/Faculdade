<!-- 19. Mercado BOM DOCE

Mercado BOM DOCE está em promoção, qualquer chocolate custa R$ 3,00 cada e se a compra for
acima de uma dúzia de chocolates o preço cai para R$ 2,50 cada um. Criar um programa que auxilie o Mercado a 
calcular o valor da compra de chocolate 

a) Solicite a quantidade de chocolates comprados 

b) Após clicar num botão "Compra", exiba a mensagem "o valor da sua compra foi de XXX".    -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Quantia de chocolates:
    <input type="text" id="chocolates">
    <br>
    <button onclick="compra(0)">Compra</button>
    <div id="exibir"></div>
</body>
</html>

<script>
    function compra() {
        let qtd = Number(chocolates.value);
        let quantia = 0;
        if (qtd > 12){
            quantia = qtd*2.50;
        }else {
            quantia = qtd*3;
        }
        exibir.innerHTML = `O valor da sua compra foi de ${quantia}`
    }
</script>
